kind = "web"
previewPath = "/"
title = "Unique Levi's"
version = "1.0.0"
id = "artifacts/unique-levis"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20329

[services.development]
run = "pnpm --filter @workspace/unique-levis run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/unique-levis", "run", "build" ]
publicDir = "artifacts/unique-levis/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20329"
BASE_PATH = "/"

<!doctype html>
<html lang="en" suppressHydrationWarning>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#160f25" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Unique Levi's" />
    <title>Unique Levi's</title>
    <meta name="description" content="A modern dating app for meaningful matches and real-time conversations" />
    <link rel="icon" href="/app-icon.svg" />
    <link rel="apple-touch-icon" href="/app-icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet" />
    <style>
      @keyframes ul_bootPulse {
        0% { transform: scale(0.98); box-shadow: 0 0 0 0 rgba(255,79,122,0.4); }
        70% { transform: scale(1); box-shadow: 0 0 0 22px rgba(255,79,122,0); }
        100% { transform: scale(0.98); box-shadow: 0 0 0 0 rgba(255,79,122,0); }
      }
    </style>
    <script>
      (function () {
        try {
          var mode = localStorage.getItem("ul_theme_mode") || "system";
          var dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var resolved = mode === "dark" || mode === "light" ? mode : (dark ? "dark" : "light");
          document.documentElement.setAttribute("data-theme", resolved);
          document.documentElement.style.colorScheme = resolved;
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="min-h-full flex flex-col">
    <div id="boot-splash" aria-hidden="true" style="position:fixed;inset:0;z-index:999;display:grid;place-items:center;background:#0e0c17;color:#fff;pointer-events:none;">
      <div style="text-align:center;">
        <div style="margin:0 auto 1.25rem;display:grid;height:4rem;width:4rem;place-items:center;border-radius:999px;font-size:1.5rem;background:linear-gradient(125deg,#ff4f7a,#ff8e53);box-shadow:0 24px 45px rgba(255,79,122,0.55);animation:ul_bootPulse 900ms ease-out 1;">&#10084;</div>
        <p style="font-size:1.875rem;font-weight:900;letter-spacing:-0.02em;margin:0;font-family:system-ui,sans-serif;">Unique Levi's</p>
        <p style="margin-top:0.5rem;font-size:0.75rem;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.75);font-family:system-ui,sans-serif;">Swipe Into Something Real</p>
      </div>
    </div>
    <script>
      (function () {
        var splash = document.getElementById("boot-splash");
        if (!splash) return;
        var cleaned = false;
        var cleanup = function () {
          if (cleaned) return;
          cleaned = true;
          splash.style.opacity = "0";
          splash.style.transition = "opacity 220ms ease";
          window.setTimeout(function () { splash.remove(); }, 240);
          window.removeEventListener("ul-app-ready", onReady);
        };
        var onReady = function () { cleanup(); };
        window.addEventListener("ul-app-ready", onReady, { once: true });
        window.setTimeout(cleanup, 6000);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

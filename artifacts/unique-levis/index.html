<!doctype html>
<html lang="en" suppressHydrationWarning>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#160f25" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Unique Levi's" />
    <title>Unique Levi's</title>
    <meta name="description" content="A modern dating app for meaningful matches and real-time conversations" />
    <link rel="icon" href="/app-icon.svg" />
    <link rel="apple-touch-icon" href="/app-icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet" />
    <style>
      @keyframes ul_pulse {
        0% { transform: scale(0.96); box-shadow: 0 0 0 0 rgba(255,79,122,0.5); }
        70% { transform: scale(1.04); box-shadow: 0 0 0 18px rgba(255,79,122,0); }
        100% { transform: scale(0.96); box-shadow: 0 0 0 0 rgba(255,79,122,0); }
      }
      @keyframes ul_float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      @keyframes ul_fadeout {
        from { opacity: 1; }
        to { opacity: 0; visibility: hidden; }
      }
    </style>
    <script>
      (function () {
        try {
          var mode = localStorage.getItem("ul_theme_mode") || "system";
          var dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var resolved = mode === "dark" || mode === "light" ? mode : (dark ? "dark" : "light");
          document.documentElement.setAttribute("data-theme", resolved);
          document.documentElement.style.colorScheme = resolved;
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="min-h-full flex flex-col">
    <div id="boot-splash" aria-hidden="true" style="position:fixed;inset:0;z-index:9999;display:grid;place-items:center;background:#0e0c17;color:#fff;pointer-events:none;">
      <div style="text-align:center;animation:ul_float 3s ease-in-out infinite;">
        <div style="margin:0 auto 1.25rem;display:grid;height:4.5rem;width:4.5rem;place-items:center;border-radius:999px;font-size:1.75rem;background:linear-gradient(135deg,#ff4f7a,#ff8e53);box-shadow:0 24px 48px rgba(255,79,122,0.45);animation:ul_pulse 1.4s ease-in-out infinite;">
          <span style="filter:drop-shadow(0 2px 4px rgba(0,0,0,0.2));">&#10084;</span>
        </div>
        <p style="font-size:1.75rem;font-weight:900;letter-spacing:-0.02em;margin:0;font-family:'Playfair Display',serif;">Unique Levi's</p>
        <p style="margin-top:0.5rem;font-size:0.7rem;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.6);font-family:Manrope,sans-serif;">Swipe Into Something Real</p>
      </div>
    </div>
    <script>
      (function () {
        var splash = document.getElementById("boot-splash");
        if (!splash) return;
        var cleaned = false;
        var cleanup = function () {
          if (cleaned) return;
          cleaned = true;
          splash.style.animation = "ul_fadeout 300ms ease forwards";
          window.setTimeout(function () { splash.remove(); }, 350);
          window.removeEventListener("ul-app-ready", onReady);
        };
        var onReady = function () { cleanup(); };
        window.addEventListener("ul-app-ready", onReady, { once: true });
        window.setTimeout(cleanup, 5000);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
